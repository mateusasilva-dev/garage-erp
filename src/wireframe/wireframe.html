<!doctype html>
<html lang="pt">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="wireframe.css" />
        <title>Nome sistema</title>
    </head>
    <body>
        <nav class="sidebar">
            <div class="title row-sidebar">
                <div class="logo">
                    <h2>Logo</h2>
                </div>
                <h2>Nome sistema</h2>
            </div>

            <div class="perfil-usuario">
                <button class="button-usuario">Usuário: Mecânico</button>
            </div>

            <ul>
                <li><button class="button-g">Dashboard</button></li>
                <li><button class="button-g">Ordens de serviço</button></li>
            </ul>
            <div class="row-sidebar fundo-sidebar">
                <button class="button-g button-perfil">Perfil</button>
                <button class="button-g button-sair">Sair</button>
            </div>
        </nav>

        <main class="main-content">
            <header class="top-header">
                <h1 class="page-title">Ordens de serviço</h1>
                <button class="btn-new-order">Nova ordem de serviço</button>
            </header>

            <section class="content-area">
                <div class="search-container">
                    <input
                        type="text"
                        class="search-input"
                        placeholder="Pesquisar"
                    />
                    <button class="btn-filter">Filtrar</button>
                </div>

                <div class="placeholder-table">
                    Tabela com ordens<br />de serviço clicavel
                </div>
            </section>
        </main>
    </body>
</html>
