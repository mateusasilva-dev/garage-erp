<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Editar Cliente - GarageERP</title>
        <link
            rel="icon"
            href="../../assets/img/favicon-garageerp.png"
            type="image/png"
        />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="../../css/pages/administrativo/editar-cliente.css"
        />

        <script src="../../js/utils/formatters.js"></script>
        <script src="../../js/components/alert-ui-utils.js"></script>
        <script src="../../js/services/auth-service.js"></script>
    </head>
    <body data-perfil-permitido="administrativo">
        <div class="app-layout">
            <ge-sidebar
                user-name="Maria Santos"
                role="Administrativo"
                type="admin"
            >
            </ge-sidebar>
            <main class="main-content">
                <a href="listar-clientes.html" class="link-voltar">
                    <img
                        src="../../assets/icons/icon-left-arrow.svg"
                        alt="Voltar"
                    />
                    Voltar para Clientes
                </a>
                <form class="card-edicao">
                    <div>
                        <h1>Editar Cliente</h1>
                        <p class="subtitulo">
                            Atualize as informações do cliente
                        </p>
                    </div>
                    <div class="alerta-info">
                        <img
                            src="../../assets/icons/icon-blue-user.svg"
                            alt=""
                        />
                        <span
                            >Preencha os dados do cliente. Todos os campos são
                            obrigatórios.</span
                        >
                    </div>
                    <div class="input-box">
                        <label>Nome Completo *</label>
                        <input placeholder="Maria Santos" type="text" />
                        <p class="ajuda">Nome que aparecerá nos registros</p>
                    </div>
                    <div class="input-box">
                        <label>Telefone *</label>
                        <input placeholder="(11) 97654-3210" type="tel" />
                        <p class="ajuda">Telefone para contato</p>
                    </div>
                    <div class="input-box">
                        <label>Email *</label>
                        <input placeholder="maria@email.com" type="email" />
                        <p class="ajuda">Email para notificações</p>
                    </div>
                    <div class="acoes-form">
                        <button type="button" class="btn-cancelar">
                            Cancelar
                        </button>
                        <button type="submit" class="btn-atualizar">
                            <img
                                src="../../assets/icons/icon-save.svg"
                                alt=""
                            />
                            Atualizar Cliente
                        </button>
                    </div>
                </form>
            </main>
        </div>

        <script src="../../js/components/sidebar-component.js"></script>
        <script src="../../js/utils/migrador-storage.js"></script>
        <script src="../../js/repositories/cliente-repository.js"></script>
        <script src="../../js/controllers/editar-cliente-controller.js"></script>
    </body>
</html>
