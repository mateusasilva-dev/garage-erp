<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Veículos</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="../../css/pages/proprietario/veiculos.css" href="veiculos.css">
</head>
<body>
  <header class="header">
    <div class="header-textos">
      <div class="header-titulo">
        <h1>Veículos</h1>
      </div>

      <div class="header-subtitulo">
        <p>Gerencie os veículos cadastrados</p>
      </div>
    </div>

    <button class="header-botao">+ Novo Veículo</button>
  </header>
</body>

  <main>
  <div class="pesquisa">
    <div class="busca">
      <img src="img/Icone Lupa.svg" alt="imagem lupa">
      <input
        type="text"
        placeholder="Buscar por marca, modelo, placa ou cliente..."
        class="search"
      >
    </div>

    <div class="lista">
      <div class="card">
        <div class="card-topo">
          <img src="img/Icone Carro.svg" alt="imagem carro" class="icone-carro">

          <div class="card-acoes">
            <img src="img/Icone Editar.svg" alt="editar veículo">
            <img src="img/Icone Lixeira.svg" alt="excluir veículo">
          </div>
        </div>

        <div class="card-veiculo">
          <p class="veiculo">Volkswagen Gol</p>
          <p class="placa">ABC-1234 &bull; 2020</p>
        </div>

        <div class="proprietario">
          <p class="proprietario-titulo">Proprietário</p>
          <p class="proprietario-nome">João Silva</p>
        </div>

        <button class="historico">Ver Histórico</button>
      </div>

      <div class="card">
        <div class="card-topo">
          <img src="img/Icone Carro.svg" alt="imagem carro" class="icone-carro">

          <div class="card-acoes">
            <img src="img/Icone Editar.svg" alt="editar veículo">
            <img src="img/Icone Lixeira.svg" alt="excluir veículo">
          </div>
        </div>

        <div class="card-veiculo">
          <p class="veiculo">Fiat Uno</p>
          <p class="placa">DEF-5678 &bull; 2019</p>
        </div>

        <div class="proprietario">
          <p class="proprietario-titulo">Proprietário</p>
          <p class="proprietario-nome">Maria Santos</p>
        </div>

        <button class="historico">Ver Histórico</button>
      </div>

      <div class="card">
        <div class="card-topo">
          <img src="img/Icone Carro.svg" alt="imagem carro" class="icone-carro">

          <div class="card-acoes">
            <img src="img/Icone Editar.svg" alt="editar veículo">
            <img src="img/Icone Lixeira.svg" alt="excluir veículo">
          </div>
        </div>

        <div class="card-veiculo">
          <p class="veiculo">Chevrolet Onix</p>
          <p class="placa">GHI-9012 &bull; 2021</p>
        </div>

        <div class="proprietario">
          <p class="proprietario-titulo">Proprietário</p>
          <p class="proprietario-nome">Pedro Oliveira</p>
        </div>

        <button class="historico">Ver Histórico</button>
      </div>

      <div class="card">
        <div class="card-topo">
          <img src="img/Icone Carro.svg" alt="imagem carro" class="icone-carro">

          <div class="card-acoes">
            <img src="img/Icone Editar.svg" alt="editar veículo">
            <img src="img/Icone Lixeira.svg" alt="excluir veículo">
          </div>
        </div>

        <div class="card-veiculo">
          <p class="veiculo">Honda Civic</p>
          <p class="placa">JKL-3456 &bull; 2022</p>
        </div>

        <div class="proprietario">
          <p class="proprietario-titulo">Proprietário</p>
          <p class="proprietario-nome">João Silva</p>
        </div>

        <button class="historico">Ver Histórico</button>
      </div>
    </div>
  </div>
</main>
</body>
</html>
