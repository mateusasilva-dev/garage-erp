<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Veículo - GarageERP</title>
        <link
            rel="icon"
            href="../../assets/img/favicon-garageerp.png"
            type="image/png"
        />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="../../css/pages/proprietario/veiculo.css"
        />

        <script src="../../js/utils/formatters.js"></script>
        <script src="../../js/components/alert-ui-utils.js"></script>
        <script src="../../js/services/auth-service.js"></script>
    </head>
    <body data-perfil-permitido="proprietario">
        <div class="app-layout">
            <ge-sidebar
                user-name="Carlos Silva"
                role="Proprietário"
                type="proprietario"
            >
            </ge-sidebar>
            <main class="main-content">
                <a href="listar-veiculos.html" class="link-voltar">
                    <img
                        src="../../assets/icons/icon-left-arrow.svg"
                        alt="Voltar"
                    />
                    Voltar para Veículos
                </a>
                <section class="card vehicle-container">
                    <div class="vehicle-info">
                        <div class="vehicle-img">
                            <img src="../../assets/icons/icon-car.svg" alt="" />
                        </div>
                        <div class="vehicle-text">
                            <h2 id="veiculo-nome"></h2>
                            <p id="veiculo-info"></p>
                            <p id="veiculo-proprietario"></p>
                            <p id="total-servicos"></p>
                        </div>
                    </div>
                    <div class="vehicle-container-button">
                        <a href="editar-veiculo.html" class="botao btn-editar">
                            Editar Veículo
                        </a>
                        <a href="nova-ordem.html" class="botao btn-nova-ordem">
                            <img
                                src="../../assets/icons/icon-white-plus.svg"
                                alt=""
                            />
                            Nova Ordem
                        </a>
                    </div>
                </section>
                <section class="card history-container">
                    <div class="history-title">
                        <h2>Histórico de Manutenções</h2>
                        <p id="total-servicos"></p>
                    </div>
                    <div class="lista-historico" id="lista-historico"></div>
                </section>
            </main>
        </div>

        <script src="../../js/components/sidebar-component.js"></script>
        <script src="../../js/utils/migrador-storage.js"></script>
        <script src="../../js/repositories/ordem-repository.js"></script>
        <script src="../../js/repositories/cliente-repository.js"></script>
        <script src="../../js/repositories/veiculo-repository.js"></script>
        <script src="../../js/controllers/veiculo-controller.js"></script>
    </body>
</html>
