<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Login - GarageERP</title>
        <link
            rel="icon"
            href="assets/img/favicon-garageerp.png"
            type="image/png"
        />
        <!-- Importa a font Inter do Google Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="css/style.css" />
    </head>
    <body>
        <!-- Container principal que centraliza o conteúdo na tela -->
        <main class="container">
            <!-- Cabeçalho do card contendo o logo e o título -->
            <header class="card-header">
                <!-- Caixa do logo com borda e sombra -->
                <div class="logo-box">
                    <img
                        src="assets/img/logo-garageerp.png"
                        alt="Logo GarageERP"
                        class="logo-img"
                    />
                </div>

                <!-- Título principal -->
                <h1>GarageERP</h1>
                <!-- Subtítulo -->
                <p>Sistema de Gestão de Oficina Mecânica</p>
            </header>

            <!-- Formulário de login -->
            <form id="form-login" novalidate>
                <!-- Fallback de Erro -->
                <div id="error-message">
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke-width="2"
                        stroke="currentColor"
                    >
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"
                        />
                    </svg>
                    <p>Email ou senha incorretos</p>
                </div>

                <!-- Grupo de input para o email -->
                <div class="input-box">
                    <label class="nome">Email</label>
                    <input
                        id="input-email"
                        placeholder="seu@email.com"
                        type="email"
                        required
                    />
                </div>

                <!-- Grupo de input para a senha -->
                <div class="input-box">
                    <label class="nome">Senha</label>
                    <input
                        id="input-password"
                        placeholder="••••••••"
                        type="password"
                        required
                    />
                </div>

                <!-- Botão de submissão do formulário -->
                <button type="submit" class="login">Entrar</button>
            </form>
        </main>

        <script src="js/login.js"></script>
    </body>
</html>
